name: Smoke Test

on:
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smoke tests
        run: pytest tests/test_smoke.py --alluredir=allure-results
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Generate HTML report
        if: always()
        run: python generate_report.py allure-report.html

      - name: Send WeCom notification
        if: always()
        run: |
          python scripts/notify_wecom.py \
            --webhook "${{ secrets.WECOM_WEBHOOK }}" \
            --results allure-results \
            --build-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --branch "${{ github.head_ref }}" \
            --trigger "PullRequest" \
            --notify-always

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: allure-report.html

      - name: Upload allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/