name: Smoke Test Gate

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:
    inputs:
      run_full_scan:
        description: Run the optional full Swagger query scan
        required: false
        default: false
        type: boolean
      test_environment:
        description: Test environment name
        required: false
        default: demo
        type: string
  workflow_call:
    inputs:
      run_full_scan:
        required: false
        default: false
        type: boolean
      test_environment:
        required: false
        default: demo
        type: string
    secrets:
      TEST_USERNAME:
        required: true
      TEST_PASSWORD:
        required: true

permissions:
  contents: read

env:
  TEST_ENVIRONMENT: ${{ inputs.test_environment || vars.TEST_ENVIRONMENT || 'demo' }}
  TEST_BASE_URL: ${{ vars.TEST_BASE_URL || 'https://aftersaleapi.demo.ehi.com.cn' }}
  TEST_LOGIN_URL: ${{ vars.TEST_LOGIN_URL || 'https://login.demo.ehi.com.cn/Account/Login' }}
  TEST_LOGIN_RETURN_URL: ${{ vars.TEST_LOGIN_RETURN_URL || 'https://djeoadmin.demo.ehi.com.cn/' }}
  ALLOWED_TEST_HOSTS: ${{ vars.ALLOWED_TEST_HOSTS || 'aftersaleapi.demo.ehi.com.cn' }}
  TEST_PLATFORM: ${{ vars.TEST_PLATFORM || 'MyEhi' }}
  TEST_VERIFY_SSL: ${{ vars.TEST_VERIFY_SSL || 'false' }}

jobs:
  smoke-test-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'workflow_call' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Run unit tests
        run: pytest tests/unit/ -o addopts="" --tb=short

      - name: Run local mock pipeline integration tests
        run: pytest tests/integration/ -o addopts="" --tb=short

      - name: Run YAML query smoke gate
        run: pytest tests/test_pipeline.py --alluredir=allure-results --clean-alluredir --tb=short
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Run full Swagger query scan
        if: inputs.run_full_scan == true
        run: pytest tests/test_smoke.py --alluredir=allure-results --tb=short
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          SMOKE_MODE: full

      - name: Generate HTML report
        if: always()
        run: python generate_report.py allure-report.html

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: allure-report.html
          if-no-files-found: warn

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: warn
