# 业务流程冒烟配置 - 投诉模块
#
# 演示多接口编排：列表查询 → 提取 id → 详情查询 → 校验入参出参一致性
# 后期熟悉业务后，按此 schema 编写实际业务流程即可。

version: 1
name: 投诉业务冒烟
module: Complaint
enabled: true
tags: [gate, query]

steps:
  # 步骤1: 查询投诉列表
  - name: query_list
    endpoint: /api/Complaint/GetComplaints
    method: GET
    type: list
    params:
      Platform: $var.platform
      SkipCount: 0
      MaxResultCount: 10
    # 从响应提取字段，供后续步骤 $ref.query_list.<key> 引用
    extract:
      complaint_id: result.items.0.id
    expect:
      status: 200
      equals:
        isSuccess: true
        errorCode: 0
      not_empty:
        - result.items

  # 步骤2: 查询投诉详情（引用步骤1提取的 id）
  - name: query_detail
    endpoint: /api/Complaint/GetComplaintInfo
    method: GET
    type: detail
    params:
      Platform: $var.platform
      id: $ref.query_list.complaint_id
    expect:
      status: 200
      equals:
        isSuccess: true
        errorCode: 0
        result.id: $ref.query_list.complaint_id
