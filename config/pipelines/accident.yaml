# 事故模块核心查询冒烟：列表 → 详情
version: 1
name: 事故业务查询冒烟
module: Accident
enabled: true
tags: [gate, query]

steps:
  - name: query_list
    endpoint: /api/Accident/GetAccidentInfos
    method: GET
    type: list
    params:
      Platform: $var.platform
      SkipCount: 0
      MaxResultCount: 10
      IsAuth: true
      IncludeRs: true
    extract:
      accident_id: result.items.0.accidentId
    expect:
      status: 200
      equals:
        isSuccess: true
        errorCode: 0
      not_empty:
        - result.items

  - name: query_detail
    endpoint: /api/Accident/GetAccidentInfo
    method: GET
    type: detail
    params:
      Platform: $var.platform
      AccidentId: $ref.query_list.accident_id
    expect:
      status: 200
      equals:
        isSuccess: true
        errorCode: 0
        result.accidentId: $ref.query_list.accident_id
